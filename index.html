<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小學英文單字高手 - 5/6年級專用</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="no-print">
        <div class="header-content">
            <h1>🎓 小學英文單字高手</h1>
            <p>專為台灣國小五、六年級設計的單字學習工具</p>
        </div>
    </header>

    <main class="container">
        <section class="controls no-print">
            <div class="card glass">
                <h2>指令中心</h2>
                <div class="button-group">
                    <button id="btn-auto" class="btn-primary">✨ 自動產生 50 個單字</button>
                    <button id="btn-manual" class="btn-secondary">✍️ 手動輸入模式</button>
                    <button id="btn-quiz" class="btn-warning">🎮 進入測驗遊戲</button>
                    <button id="btn-spelling" class="btn-info">✨ 拼字比賽</button>
                    <button id="btn-dialogue" class="btn-primary">💬 情境對話</button>
                    <button id="btn-gloria" class="btn-warning">🎓 葛洛莉單字考試</button>
                    <button id="btn-print" class="btn-success">🖨️ 列印 A4 (50格卡片)</button>
                </div>

                <div class="difficulty-selector">
                    <span>難易度：</span>
                    <label class="diff-label">
                        <input type="radio" name="difficulty" value="low" checked>
                        <span class="diff-btn">低級</span>
                    </label>
                    <label class="diff-label">
                        <input type="radio" name="difficulty" value="high">
                        <span class="diff-btn">高級</span>
                    </label>
                </div>

                <div id="manual-input-area" class="hidden">
                    <textarea id="manual-text" placeholder="格式：單字 [音標] 中文 / 例句. 中文例句. (每行一個單字)"></textarea>
                    <button id="btn-submit-manual" class="btn-primary">確定生成</button>
                </div>
            </div>
        </section>

        <section id="stats-bar" class="no-print hidden">
            <div class="stats-content">
                <span>當前單字數：<strong id="word-count">0</strong></span>
                <span class="tip">提示：點擊卡片可聽發音，或點擊「印表機」預覽 A4 裁剪模式</span>
            </div>
        </section>

        <div id="card-grid" class="card-grid print-grid">
            <!-- 單字卡將由 JS 動態產生 -->
            <div class="empty-state no-print">
                <p>點擊上方按鈕開始您的學習之旅！</p>
            </div>
        </div>
    </main>

    <!-- 遊戲容器 -->
    <div id="quiz-overlay" class="quiz-overlay hidden no-print">
        <div class="quiz-container glass">
            <div class="quiz-header">
                <h2 id="quiz-progress">題目 1 / 3</h2>
                <button id="btn-close-quiz" class="btn-close">×</button>
            </div>

            <div id="quiz-question-area">
                <div class="quiz-sentence" id="quiz-sentence">The rainbow is _____ after the rain.</div>
                <div class="quiz-translation" id="quiz-translation">雨後的彩虹真美麗。</div>
            </div>

            <div class="quiz-options" id="quiz-options">
                <!-- 8 個選項會動態產生 -->
            </div>

            <!-- 結算畫面 -->
            <div id="quiz-result-area" class="hidden">
                <div class="result-summary">
                    <h3>測驗完成！</h3>
                    <div class="accuracy-score">正確率：<span id="quiz-accuracy">0%</span></div>
                </div>
                <div class="result-list" id="quiz-result-list">
                    <!-- 每題結果列表 -->
                </div>
                <button id="btn-restart-quiz" class="btn-primary">再玩一次</button>
            </div>
        </div>
    </div>

    <!-- 拼字遊戲容器 -->
    <div id="spelling-overlay" class="quiz-overlay hidden no-print">
        <div class="quiz-container glass spelling-game-container">
            <div class="quiz-header">
                <h2 id="spelling-progress">題目 1 / 5</h2>
                <button id="btn-close-spelling" class="btn-close">×</button>
            </div>

            <div id="spelling-question-area">
                <div class="quiz-translation" id="spelling-translation-display"></div>
                <div class="word-ipa" id="spelling-ipa-display" style="text-align: center; margin-bottom: 20px;"></div>

                <!-- 拼字輸入顯示區域 -->
                <div class="spelling-input-area" id="spelling-input-area">
                    <!-- 字母格將動態產生 -->
                </div>

                <!-- 字母池 -->
                <div class="letter-pool" id="letter-pool">
                    <!-- 混亂的字母按鈕將動態產生 -->
                </div>

                <div class="spelling-actions">
                    <button id="btn-spelling-reset" class="btn-secondary">重置</button>
                    <button id="btn-spelling-delete" class="btn-warning">刪除</button>
                    <button id="btn-spelling-submit" class="btn-primary">檢查答案</button>
                </div>
            </div>

            <!-- 拼字遊戲結算畫面 -->
            <div id="spelling-result-area" class="hidden">
                <div class="result-summary">
                    <h3>拼字挑戰完成！</h3>
                    <div class="accuracy-score">正確率：<span id="spelling-accuracy">0%</span></div>
                </div>
                <div class="result-list" id="spelling-result-list">
                    <!-- 每題結果列表 -->
                </div>
                <button id="btn-restart-spelling" class="btn-primary">再挑戰一次</button>
            </div>
        </div>
    </div>

    <!-- 情境對話遊戲容器 -->
    <div id="dialogue-overlay" class="quiz-overlay hidden no-print">
        <div class="quiz-container glass dialogue-game-container">
            <div class="quiz-header">
                <h2 id="dialogue-title">情境對話</h2>
                <button id="btn-close-dialogue" class="btn-close">×</button>
            </div>

            <div id="dialogue-question-area-inner">
                <div class="dialogue-display" id="dialogue-display">
                    <!-- 對話內容將動態產生 -->
                </div>

                <div class="dialogue-options letter-pool" id="dialogue-options">
                    <!-- 選項將動態產生 -->
                </div>

                <div class="dialogue-actions"
                    style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
                    <button id="btn-dialogue-reset" class="btn-secondary">重置</button>
                    <button id="btn-dialogue-submit" class="btn-primary">檢查答案</button>
                </div>
            </div>

            <!-- 結算畫面 -->
            <div id="dialogue-result-area" class="hidden">
                <div class="result-summary">
                    <h3>場景完成！</h3>
                    <div class="accuracy-score"><span id="dialogue-feedback"></span></div>
                </div>
                <div class="result-list" id="dialogue-result-list"
                    style="max-height: 250px; overflow-y: auto; text-align: left; margin-bottom: 20px;">
                    <!-- 每題結果列表將由 JS 動態產生 -->
                </div>
                <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                    <button id="btn-next-dialogue" class="btn-primary">下一個場景</button>
                    <button id="btn-restart-dialogue" class="btn-secondary">重新挑戰</button>
                </div>
            </div>
        </div>
    </div>


    <!-- 葛洛莉單字考試容器 -->
    <div id="gloria-overlay" class="quiz-overlay hidden no-print">
        <div class="quiz-container glass gloria-game-container">
            <div class="quiz-header">
                <h2 id="gloria-title">葛洛莉單字考試</h2>
                <button id="btn-close-gloria" class="btn-close">×</button>
            </div>

            <div id="gloria-lesson-selector" class="lesson-grid">
                <!-- 課程按鈕將動態產生 -->
            </div>

            <div id="gloria-question-area" class="hidden">
                <div class="quiz-header">
                    <h2 id="gloria-progress">題目 1 / 10</h2>
                </div>
                <div class="gloria-question-content"
                    style="display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px;">
                    <div id="gloria-chinese-display"
                        style="font-size: 2.5rem; font-weight: 700; color: var(--text-main);">
                    </div>
                    <button id="btn-gloria-speak" class="btn-primary"
                        style="width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; padding: 0; flex-shrink: 0;">🔊</button>
                </div>

                <div class="gloria-input-wrapper">
                    <input type="text" id="gloria-answer-input" placeholder="請輸入英文單字..." autocomplete="off">
                    <button id="btn-gloria-submit" class="btn-primary" style="margin-top: 20px; width: 100%;">確定
                        (Enter)</button>
                </div>
                <div id="gloria-feedback" class="gloria-feedback"
                    style="text-align: center; margin-top: 20px; font-size: 1.2rem;"></div>
            </div>

            <!-- 葛洛莉考試結算畫面 -->
            <div id="gloria-result-area" class="hidden">
                <div class="result-summary">
                    <h3 id="gloria-result-title">考試完成！</h3>
                    <div class="accuracy-score">正確率：<span id="gloria-accuracy">0%</span></div>
                </div>
                <div class="result-list" id="gloria-result-list">
                    <!-- 每題結果列表 -->
                </div>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button id="btn-restart-gloria" class="btn-primary">重新選擇課程</button>
                    <button id="btn-close-gloria-final" class="btn-secondary">結束</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="no-print">
        <p>&copy; 2026 英文學習小助手 - 讓學習變得更有趣</p>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
